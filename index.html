<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приёмка сырья</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
  padding: 16px;
}
h2 {
  font-size: 20px;
  margin-bottom: 20px;
  color: var(--tg-theme-text-color, #000);
}
.field { margin-bottom: 16px; }
label {
  display: block;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
select, input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  background: var(--tg-theme-secondary-bg-color, #f5f5f5);
  color: var(--tg-theme-text-color, #000);
  appearance: none;
}
.btn {
  width: 100%;
  padding: 16px;
  background: var(--tg-theme-button-color, #2196F3);
  color: var(--tg-theme-button-text-color, #fff);
  border: none;
  border-radius: 10px;
  font-size: 17px;
  font-weight: 600;
  margin-top: 24px;
  cursor: pointer;
}
.btn:active { opacity: 0.8; }
.photo-zone {
  border: 2px dashed #ddd;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  position: relative;
}
.photo-zone input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.photo-zone p { color: #888; font-size: 14px; }
.previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.previews img {
  width: 70px; height: 70px;
  border-radius: 6px;
  object-fit: cover;
}
.success {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.success h3 { font-size: 24px; margin-bottom: 8px; }
.success p { color: #888; }
</style>
</head>
<body>

<div id="form">
  <h2>📦 Приёмка сырья</h2>

  <div class="field">
    <label>Поставщик</label>
    <select id="supplier">
      <option value="">— выберите —</option>
    </select>
  </div>

  <div class="field">
    <label>Накладная №</label>
    <input type="text" id="doc" placeholder="НК-00123" />
  </div>

  <div class="field">
    <label>Сырьё</label>
    <select id="material">
      <option value="">— выберите —</option>
    </select>
  </div>

  <div class="field">
    <label>Количество</label>
    <input type="number" id="qty" placeholder="0" min="0" step="any" />
  </div>

  <div class="field">
    <label>Единица измерения</label>
    <select id="unit">
      <option value="кг">кг (по умолчанию)</option>
      <option value="л">л</option>
      <option value="шт">шт</option>
      <option value="уп">уп</option>
      <option value="т">т</option>
      <option value="м²">м²</option>
    </select>
  </div>

  <div class="field">
    <label>Фото накладной / товара</label>
    <div class="photo-zone" id="photoZone">
      <input type="file" accept="image/*" multiple onchange="handlePhotos(this)" />
      <p>📷 Нажмите чтобы добавить фото</p>
    </div>
    <div class="previews" id="previews"></div>
  </div>

  <button class="btn" onclick="submit()">Отправить приёмку</button>
</div>

<div class="success" id="success">
  <h3>✅ Готово!</h3>
  <p>Приёмка записана в таблицу</p>
</div>

<script>
const SCRIPT_URL = 'ВСТАВЬ_URL_СКРИПТА';
const tg = window.Telegram.WebApp;
tg.expand();

// Загружаем справочник
async function loadData() {
  try {
    const res = await fetch(SCRIPT_URL + '?action=getRef');
    const data = await res.json();
    
    const supSel = document.getElementById('supplier');
    data.suppliers.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      supSel.appendChild(opt);
    });

    const matSel = document.getElementById('material');
    data.materials.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m; opt.textContent = m;
      matSel.appendChild(opt);
    });
  } catch(e) {
    console.log('Ошибка загрузки справочника', e);
  }
}

// Фото
let photoFiles = [];
function handlePhotos(input) {
  photoFiles = Array.from(input.files);
  const prev = document.getElementById('previews');
  prev.innerHTML = '';
  photoFiles.forEach(f => {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    prev.appendChild(img);
  });
}

// Отправка
async function submit() {
  const supplier = document.getElementById('supplier').value;
  const doc = document.getElementById('doc').value.trim();
  const material = document.getElementById('material').value;
  const qty = document.getElementById('qty').value;
  const unit = document.getElementById('unit').value;

  if (!supplier || !doc || !material || !qty) {
    alert('Заполните все поля!');
    return;
  }

  const formData = new FormData();
  formData.append('action', 'savePriem');
  formData.append('supplier', supplier);
  formData.append('doc', doc);
  formData.append('material', material);
  formData.append('qty', qty);
  formData.append('unit', unit);
  formData.append('user', tg.initDataUnsafe?.user?.first_name || 'Кладовщик');
  
  if (photoFiles.length > 0) {
    formData.append('hasPhoto', 'да');
  }

  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: formData });
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    setTimeout(() => tg.close(), 2000);
  } catch(e) {
    alert('Ошибка отправки. Попробуйте ещё раз.');
  }
}

loadData();
</script>
</body>
</html>
